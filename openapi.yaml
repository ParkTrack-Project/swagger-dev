        minimum: 1
        maximum: 100
      description: Максимальное количество элементов.
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Смещение для пагинации.
    BBox:
      name: bbox
      in: query
      required: false
      schema:
