openapi: 3.0.3
info:
  title: ParkTrack API
  version: 1.0.0
  description: 'OpenAPI-спецификация, собранная по MDX-документации ParkTrack API. Базовый путь API: /api/v1.'
servers:
- url: https://api.dev.parktrack.live/api/v1
  description: Production
security:
- bearerAuth: []
tags:
- name: Auth
  description: Регистрация, вход, выход и текущий пользователь.
- name: Users
  description: Профиль и управление пользователями.
- name: Partners
  description: Партнёры и сотрудники партнёров.
- name: Cameras
  description: Камеры и снапшоты.
- name: Parking Zones
  description: Парковочные зоны и геометрия.
- name: Occupancy
  description: Наблюдения занятости.
- name: Forecasts
  description: Прогнозы занятости.
- name: Routing
  description: Поиск парковки и маршруты.
- name: Data Sources
  description: Единый реестр источников данных.
- name: Admin
  description: Административный мониторинг и действия.
- name: System
  description: Служебные эндпоинты.
paths:
  /auth/register:
    post:
      tags:
      - Auth
      summary: Регистрация пользователя
      operationId: authRegister
      description: Создаёт обычного пользователя и новую сессию.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security: []
  /auth/login:
    post:
      tags:
      - Auth
      summary: Вход пользователя
      operationId: authLogin
      description: Аутентифицирует пользователя и создаёт новую сессию.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      security: []
  /auth/logout:
    post:
      tags:
      - Auth
      summary: Выход пользователя
      operationId: authLogout
      description: Завершает текущую сессию.
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags:
      - Auth
      summary: Текущий пользователь и права
      operationId: authMe
      description: Возвращает пользователя, глобальные разрешения и партнёрские членства.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me:
    get:
      tags:
      - Users
      summary: Профиль текущего пользователя
      operationId: getMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags:
      - Users
      summary: Обновить профиль текущего пользователя
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users/me/password:
    put:
      tags:
      - Users
      summary: Сменить пароль текущего пользователя
      operationId: changeMyPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users:
    get:
      tags:
      - Users
      summary: Список пользователей
      operationId: listUsers
      parameters:
      - $ref: '#/components/parameters/Q'
      - name: role
        in: query
        required: false
        schema:
          type: string
        description: Глобальная роль.
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
        description: Фильтр по активности.
      - &id001
        $ref: '#/components/parameters/Top'
      - &id002
        $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401': &id003
          $ref: '#/components/responses/Unauthorized'
        '403': &id004
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
      - Users
      summary: Создать пользователя
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserIdResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users/{user_id}:
    get:
      tags:
      - Users
      summary: Получить пользователя
      operationId: getUser
      parameters:
      - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Users
      summary: Обновить пользователя
      operationId: updateUser
      parameters:
      - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - Users
      summary: Деактивировать пользователя
      operationId: deleteUser
      parameters:
      - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /partners:
    get:
      tags:
      - Partners
      summary: Список партнёров
      operationId: listPartners
      parameters:
      - $ref: '#/components/parameters/Q'
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
        description: Фильтр по активности.
      - *id001
      - *id002
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerListResponse'
        '401': *id003
        '403': *id004
    post:
      tags:
      - Partners
      summary: Создать партнёра
      operationId: createPartner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerIdResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /partners/{partner_id}:
    get:
      tags:
      - Partners
      summary: Получить партнёра
      operationId: getPartner
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Partner'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Partners
      summary: Обновить партнёра
      operationId: updatePartner
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Partner'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - Partners
      summary: Деактивировать партнёра
      operationId: deletePartner
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /partners/{partner_id}/members:
    get:
      tags:
      - Partners
      summary: Список сотрудников партнёра
      operationId: listPartnerMembers
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      - $ref: '#/components/parameters/Q'
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
      - name: role
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/PartnerRole'
      - *id001
      - *id002
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMembershipListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
      - Partners
      summary: Добавить сотрудника партнёра
      operationId: createPartnerMember
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerMemberCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMembership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /partners/{partner_id}/members/{user_id}:
    get:
      tags:
      - Partners
      summary: Получить членство пользователя в партнёре
      operationId: getPartnerMember
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMembership'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Partners
      summary: Обновить членство пользователя в партнёре
      operationId: updatePartnerMember
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerMemberUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerMembership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - Partners
      summary: Отключить пользователя от партнёра
      operationId: deletePartnerMember
      parameters:
      - $ref: '#/components/parameters/PartnerId'
      - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /cameras:
    get:
      tags:
      - Cameras
      summary: Список камер
      operationId: listCameras
      parameters:
      - $ref: '#/components/parameters/Q'
      - name: partner_id
        in: query
        required: false
        schema:
          type: integer
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
      - $ref: '#/components/parameters/BBox'
      - name: view
        in: query
        required: false
        schema:
          type: string
          enum:
          - full
          - map
        description: full по умолчанию; map для карты.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/Camera'
                - type: array
                  items:
                    $ref: '#/components/schemas/CameraMapItem'
        '401': *id003
        '403': *id004
        '422':
          $ref: '#/components/responses/ValidationError'
  /cameras/new:
    post:
      tags:
      - Cameras
      summary: Создать камеру
      operationId: createCamera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraIdResponse'
        '400': &id005
          $ref: '#/components/responses/BadRequest'
        '401': &id006
          $ref: '#/components/responses/Unauthorized'
        '403': &id007
          $ref: '#/components/responses/Forbidden'
        '404': &id008
          $ref: '#/components/responses/NotFound'
        '409': &id009
          $ref: '#/components/responses/Conflict'
        '415': &id010
          $ref: '#/components/responses/UnsupportedMediaType'
        '422': &id011
          $ref: '#/components/responses/ValidationError'
  /cameras/next:
    get:
      tags:
      - Cameras
      summary: Следующая камера для обработки
      operationId: getNextCamera
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraNext'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /cameras/{camera_id}:
    get:
      tags:
      - Cameras
      summary: Получить камеру
      operationId: getCamera
      parameters:
      - $ref: '#/components/parameters/CameraId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Cameras
      summary: Обновить камеру
      operationId: updateCamera
      parameters:
      - $ref: '#/components/parameters/CameraId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - Cameras
      summary: Удалить камеру
      operationId: deleteCamera
      parameters:
      - $ref: '#/components/parameters/CameraId'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /cameras/{camera_id}/snapshot:
    get:
      tags:
      - Cameras
      summary: Снапшот камеры
      operationId: getCameraSnapshot
      parameters:
      - $ref: '#/components/parameters/CameraId'
      - name: annotated
        in: query
        required: false
        schema:
          type: boolean
      - name: fallback_to_raw
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /zones:
    get:
      tags:
      - Parking Zones
      summary: Список парковочных зон
      operationId: listZones
      parameters:
      - name: camera_id
        in: query
        required: false
        schema:
          type: integer
      - name: partner_id
        in: query
        required: false
        schema:
          type: integer
      - name: is_active
        in: query
        required: false
        schema:
          type: boolean
      - name: min_free_count
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      - name: min_confidence
        in: query
        required: false
        schema:
          type: number
          format: double
          minimum: 0
          maximum: 1
      - name: max_pay
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      - name: include_private
        in: query
        required: false
        schema:
          type: boolean
      - name: include_accessible
        in: query
        required: false
        schema:
          type: boolean
      - name: hide_location_types
        in: query
        required: false
        schema:
          type: string
      - $ref: '#/components/parameters/BBox'
      - name: view
        in: query
        required: false
        schema:
          type: string
          enum:
          - full
          - map
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/Zone'
                - type: array
                  items:
                    $ref: '#/components/schemas/ZoneMapItem'
        '401': *id003
        '403': *id004
        '422':
          $ref: '#/components/responses/ValidationError'
  /zones/new:
    post:
      tags:
      - Parking Zones
      summary: Создать парковочную зону
      operationId: createZone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneIdResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /zones/{zone_id}:
    get:
      tags:
      - Parking Zones
      summary: Получить парковочную зону
      operationId: getZone
      parameters:
      - $ref: '#/components/parameters/ZoneId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Parking Zones
      summary: Обновить парковочную зону
      operationId: updateZone
      parameters:
